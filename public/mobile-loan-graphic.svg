<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-labelledby="title desc">
  <title id="title">手機貸款圖示</title>
  <desc id="desc">手機貸款主題插畫，包含手機、金幣與存錢筒。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e9f5ff"/>
      <stop offset="100%" stop-color="#d9efff"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5ea7ff"/>
      <stop offset="100%" stop-color="#1d78ff"/>
    </linearGradient>
    <linearGradient id="phone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fefefe"/>
      <stop offset="100%" stop-color="#d7e6ff"/>
    </linearGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe46a"/>
      <stop offset="100%" stop-color="#ffbf2f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#1d4ed8" flood-opacity=".16"/>
    </filter>
  </defs>

  <rect width="800" height="800" rx="36" fill="url(#bg)"/>

  <rect x="28" y="28" width="744" height="744" rx="34" fill="white" opacity=".45"/>
  <path d="M0 610 C110 560, 200 640, 320 598 C435 557, 552 505, 800 570 L800 800 L0 800 Z" fill="url(#wave)"/>
  <path d="M0 650 C135 600, 220 690, 340 648 C470 604, 575 560, 800 620 L800 800 L0 800 Z" fill="#4d95f7" opacity=".9"/>

  <g filter="url(#shadow)">
    <rect x="210" y="286" width="220" height="360" rx="32" fill="url(#phone)" stroke="#2056d3" stroke-width="10"/>
    <rect x="236" y="336" width="168" height="210" rx="22" fill="#0f4bd7"/>
    <rect x="274" y="366" width="92" height="24" rx="12" fill="#74b7ff" opacity=".45"/>
    <circle cx="310" cy="446" r="38" fill="#18c96a"/>
    <path d="M293 445l11 11 23-28" fill="none" stroke="#fff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="287" y="579" width="40" height="12" rx="6" fill="#9bb6df"/>
  </g>

  <g filter="url(#shadow)">
    <circle cx="560" cy="560" r="94" fill="#ffffff" opacity=".55"/>
    <path d="M512 567c0-27 22-49 49-49h22c28 0 51 23 51 51v13c0 27-23 50-51 50h-20c-28 0-51-23-51-51z" fill="#fff" stroke="#1887ff" stroke-width="10"/>
    <rect x="550" y="513" width="12" height="120" rx="6" fill="#ffb52f"/>
    <circle cx="556" cy="498" r="18" fill="#ffb52f"/>
    <text x="556" y="573" text-anchor="middle" font-size="42" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#ffb52f">$</text>
  </g>

  <g fill="url(#coin)" stroke="#ffce4c" stroke-width="8" filter="url(#shadow)">
    <circle cx="140" cy="200" r="30"/>
    <circle cx="180" cy="270" r="18"/>
    <circle cx="620" cy="160" r="28"/>
    <circle cx="690" cy="260" r="20"/>
    <circle cx="650" cy="690" r="26"/>
  </g>

  <g filter="url(#shadow)">
    <path d="M122 628c0-42 34-76 76-76h72c42 0 76 34 76 76 0 27-15 50-37 63v31h-120v-31c-22-13-37-36-37-63z" fill="#fff"/>
    <circle cx="216" cy="580" r="16" fill="#7ec8ff"/>
    <path d="M190 617c18-12 32-15 52-15s35 3 52 15" fill="none" stroke="#2056d3" stroke-width="8" stroke-linecap="round"/>
    <circle cx="174" cy="706" r="10" fill="#2056d3"/>
    <circle cx="258" cy="706" r="10" fill="#2056d3"/>
  </g>

  <g fill="#1248c9" font-family="Arial, Helvetica, sans-serif" font-weight="800">
    <text x="64" y="92" font-size="50">手機貸款</text>
    <text x="64" y="146" font-size="34" fill="#ff9f1a">最高 15 萬急速入袋</text>
  </g>

  <text x="402" y="738" text-anchor="middle" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#fff">
    手機免抵押｜不限機種｜撥款快
  </text>
</svg>
